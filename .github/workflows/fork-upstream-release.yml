name: Fork upstream patched release

on:
  push:
    branches:
      - main
    paths:
      - .github/patches/provider-stream-retries.patch
      - .github/workflows/fork-upstream-release.yml
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: Optional stable openai/codex rust-vX.Y.Z release tag
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: fork-upstream-patched-release
  cancel-in-progress: false

env:
  UPSTREAM_REPOSITORY: openai/codex
  PATCH_FILE: .github/patches/provider-stream-retries.patch

jobs:
  detect:
    name: Detect upstream release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      prerelease: ${{ steps.release.outputs.prerelease }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      should_build: ${{ steps.release.outputs.should_build }}
      upstream_tag: ${{ steps.release.outputs.upstream_tag }}
      upstream_url: ${{ steps.release.outputs.upstream_url }}
    steps:
      - name: Select newest unreleased stable upstream tag
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_TAG: ${{ inputs.upstream_tag }}
        run: |
          set -euo pipefail

          upstream_tag="$REQUESTED_TAG"
          if [[ -z "$upstream_tag" ]]; then
            upstream_tag="$(
              gh api "repos/${UPSTREAM_REPOSITORY}/releases?per_page=100" \
                --jq '[.[] | select(
                  .draft == false and
                  .prerelease == false and
                  (.tag_name | test("^rust-v[0-9]+\\.[0-9]+\\.[0-9]+$"))
                )] | first | .tag_name // empty'
            )"
          fi

          if [[ ! "$upstream_tag" =~ ^rust-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "No valid stable upstream rust release tag found: $upstream_tag" >&2
            exit 1
          fi

          release_json="$(gh api "repos/${UPSTREAM_REPOSITORY}/releases/tags/${upstream_tag}")"
          draft="$(jq -r '.draft' <<<"$release_json")"
          prerelease="$(jq -r '.prerelease' <<<"$release_json")"
          if [[ "$draft" != "false" || "$prerelease" != "false" ]]; then
            echo "Upstream release must be published and not a prerelease: $upstream_tag" >&2
            exit 1
          fi
          upstream_url="$(jq -r '.html_url' <<<"$release_json")"
          release_tag="fork-${upstream_tag}"

          if gh release view "$release_tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            should_build=false
            echo "Release $release_tag already exists; nothing to do."
          else
            should_build=true
            echo "Will build $release_tag from $upstream_tag."
          fi

          {
            echo "prerelease=$prerelease"
            echo "release_tag=$release_tag"
            echo "should_build=$should_build"
            echo "upstream_tag=$upstream_tag"
            echo "upstream_url=$upstream_url"
          } >>"$GITHUB_OUTPUT"

  validate:
    name: Validate patch against upstream
    needs: detect
    if: needs.detect.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout fork configuration
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: fork-config
          persist-credentials: false
      - name: Checkout upstream release
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.UPSTREAM_REPOSITORY }}
          ref: ${{ needs.detect.outputs.upstream_tag }}
          path: source
          persist-credentials: false
      - name: Check patch
        shell: bash
        run: git -C source apply --check "../fork-config/${PATCH_FILE}"

  report-patch-conflict:
    name: Report patch conflict
    needs: [detect, validate]
    if: >-
      ${{
        always() &&
        needs.detect.outputs.should_build == 'true' &&
        needs.validate.result == 'failure'
      }}
    runs-on: ubuntu-24.04
    permissions:
      issues: write
    steps:
      - name: Open one conflict issue
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_TAG: ${{ needs.detect.outputs.upstream_tag }}
          UPSTREAM_URL: ${{ needs.detect.outputs.upstream_url }}
        run: |
          set -euo pipefail
          title="Patch conflict for ${UPSTREAM_TAG}"
          existing="$(
            gh issue list \
              --repo "$GITHUB_REPOSITORY" \
              --state open \
              --search "$title in:title" \
              --json number \
              --jq '.[0].number // empty' 2>/dev/null || true
          )"
          if [[ -n "$existing" ]]; then
            echo "Conflict issue #$existing is already open."
            exit 0
          fi

          body="The automatic fork release could not apply \`${PATCH_FILE}\` to [${UPSTREAM_TAG}](${UPSTREAM_URL}). Update the patch file, then rerun this workflow."
          gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "$body" || true

  build:
    name: Build ${{ matrix.target }}
    needs: [detect, validate]
    if: needs.validate.result == 'success'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      CARGO_PROFILE_RELEASE_SPLIT_DEBUGINFO: ${{ contains(matrix.target, 'apple-darwin') && 'packed' || 'off' }}
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            archive: codex-package-x86_64-unknown-linux-musl.tar.gz
            symbols_binaries: "codex codex-code-mode-host"
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive: codex-package-x86_64-pc-windows-msvc.zip
            symbols_binaries: "codex codex-code-mode-host codex-command-runner codex-windows-sandbox-setup"
          - os: macos-15
            target: x86_64-apple-darwin
            archive: codex-package-x86_64-apple-darwin.tar.gz
            symbols_binaries: "codex codex-code-mode-host"
    steps:
      - name: Checkout fork configuration
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: fork-config
          persist-credentials: false
      - name: Checkout upstream release
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.UPSTREAM_REPOSITORY }}
          ref: ${{ needs.detect.outputs.upstream_tag }}
          path: source
          persist-credentials: false
      - name: Apply patch
        shell: bash
        run: |
          set -euo pipefail
          git -C source apply --check "../fork-config/${PATCH_FILE}"
          git -C source apply "../fork-config/${PATCH_FILE}"
      - name: Configure build directory
        shell: bash
        run: echo "CARGO_TARGET_DIR=${RUNNER_TEMP}/codex-target" >>"$GITHUB_ENV"
      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install DotSlash
        uses: facebook/install-dotslash@1e4e7b3e07eaca387acb98f1d4720e0bee8dbb6a # v2
      - name: Read pinned Rust toolchain
        id: rust-toolchain
        shell: bash
        run: |
          set -euo pipefail
          channel="$(sed -nE 's/^channel = "([^"]+)"/\1/p' source/codex-rs/rust-toolchain.toml)"
          if [[ -z "$channel" ]]; then
            echo "Unable to read the pinned Rust toolchain." >&2
            exit 1
          fi
          echo "channel=$channel" >>"$GITHUB_OUTPUT"
      - name: Install Rust target
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.channel }}
          targets: ${{ matrix.target }}
      - name: Configure MSVC
        if: runner.os == 'Windows'
        uses: ./source/.github/actions/setup-msvc-env
        with:
          target: ${{ matrix.target }}
      - name: Install Zig
        if: runner.os == 'Linux'
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.14.0
          use-cache: false
      - name: Install Linux musl tools
        if: runner.os == 'Linux'
        shell: bash
        env:
          APT_INSTALL_ARGS: --no-install-recommends binutils
          TARGET: ${{ matrix.target }}
        run: bash source/.github/scripts/install-musl-build-tools.sh
      - name: Configure Linux release build
        if: runner.os == 'Linux'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          target_no_jitter="AWS_LC_SYS_NO_JITTER_ENTROPY_${TARGET//-/_}"
          {
            echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1"
            echo "${target_no_jitter}=1"
          } >>"$GITHUB_ENV"
      - name: Build bundled bwrap
        if: runner.os == 'Linux'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        working-directory: source/codex-rs
        run: |
          set -euo pipefail
          cargo build --target "$TARGET" --release --bin bwrap
          bwrap_path="${CARGO_TARGET_DIR}/${TARGET}/release/bwrap"
          strip --strip-debug --strip-unneeded "$bwrap_path"
          digest="$(sha256sum "$bwrap_path" | awk '{print $1}')"
          {
            echo "BWRAP_BIN=$bwrap_path"
            echo "CODEX_BWRAP_SHA256=$digest"
          } >>"$GITHUB_ENV"
      - name: Build release binaries
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          python_bin=python3
          if ! command -v "$python_bin" >/dev/null 2>&1; then
            python_bin=python
          fi

          args=(
            source/scripts/build_codex_package.py
            --target "$TARGET"
            --variant codex
            --cargo-profile release
            --package-dir "${RUNNER_TEMP}/codex-package-${TARGET}"
            --force
          )
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            args+=(--bwrap-bin "$BWRAP_BIN")
          fi
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            export LIBSQLITE3_FLAGS=SQLITE_DISABLE_INTRINSIC
          fi

          "$python_bin" "${args[@]}"
      - name: Normalize Windows PDB names
        if: runner.os == 'Windows'
        shell: bash
        env:
          SYMBOL_BINARIES: ${{ matrix.symbols_binaries }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          release_dir="${CARGO_TARGET_DIR}/${TARGET}/release"
          for binary in $SYMBOL_BINARIES; do
            normalized_name="${binary//-/_}.pdb"
            source_pdb="${release_dir}/${normalized_name}"
            target_pdb="${release_dir}/${binary}.pdb"
            if [[ ! -f "$source_pdb" ]]; then
              source_pdb="$target_pdb"
            fi
            if [[ ! -f "$source_pdb" ]]; then
              echo "PDB for $binary not found in $release_dir" >&2
              exit 1
            fi
            if [[ "$source_pdb" != "$target_pdb" ]]; then
              cp "$source_pdb" "$target_pdb"
            fi
          done
      - name: Build symbols archive and strip release binaries
        shell: bash
        env:
          SYMBOL_BINARIES: ${{ matrix.symbols_binaries }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          bash source/.github/scripts/archive-release-symbols-and-strip-binaries.sh \
            --target "$TARGET" \
            --artifact-name "$TARGET" \
            --release-dir "${CARGO_TARGET_DIR}/${TARGET}/release" \
            --archive-dir "${GITHUB_WORKSPACE}/dist" \
            --binaries "$SYMBOL_BINARIES"
      - name: Build release package
        shell: bash
        env:
          ARCHIVE_NAME: ${{ matrix.archive }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          python_bin=python3
          if ! command -v "$python_bin" >/dev/null 2>&1; then
            python_bin=python
          fi

          release_dir="${CARGO_TARGET_DIR}/${TARGET}/release"
          exe_suffix=""
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            exe_suffix=".exe"
          fi
          args=(
            source/scripts/build_codex_package.py
            --target "$TARGET"
            --variant codex
            --cargo-profile release
            --package-dir "${RUNNER_TEMP}/codex-package-${TARGET}"
            --archive-output "${GITHUB_WORKSPACE}/dist/${ARCHIVE_NAME}"
            --entrypoint-bin "${release_dir}/codex${exe_suffix}"
            --code-mode-host-bin "${release_dir}/codex-code-mode-host${exe_suffix}"
            --force
          )
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            args+=(--bwrap-bin "$BWRAP_BIN")
          fi
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            args+=(
              --codex-command-runner-bin "${release_dir}/codex-command-runner.exe"
              --codex-windows-sandbox-setup-bin "${release_dir}/codex-windows-sandbox-setup.exe"
            )
          fi

          "$python_bin" "${args[@]}"
      - name: Upload release package
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codex-package-${{ matrix.target }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error
      - name: Upload symbols archive
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codex-symbols-${{ matrix.target }}
          path: dist/codex-symbols-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish fork release
    needs: [detect, build]
    if: needs.build.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout fork configuration
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: fork-config
          persist-credentials: false
      - name: Checkout upstream release
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.UPSTREAM_REPOSITORY }}
          ref: ${{ needs.detect.outputs.upstream_tag }}
          fetch-depth: 0
          path: source
          persist-credentials: false
      - name: Apply patch and publish source tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.detect.outputs.release_tag }}
          UPSTREAM_TAG: ${{ needs.detect.outputs.upstream_tag }}
        run: |
          set -euo pipefail
          git -C source apply --check "../fork-config/${PATCH_FILE}"
          git -C source apply "../fork-config/${PATCH_FILE}"
          git -C source config user.name github-actions[bot]
          git -C source config user.email 41898282+github-actions[bot]@users.noreply.github.com

          upstream_date="$(git -C source show -s --format=%aI HEAD)"
          git -C source add -- \
            codex-rs/config/src/config_toml.rs \
            codex-rs/core/src/compact.rs \
            codex-rs/core/src/compact_remote_v2.rs \
            codex-rs/core/src/config/mod.rs \
            codex-rs/core/src/responses_retry.rs \
            codex-rs/model-provider-info/src/lib.rs
          GIT_AUTHOR_DATE="$upstream_date" GIT_COMMITTER_DATE="$upstream_date" \
            git -C source commit -m "Apply fork retry patch to ${UPSTREAM_TAG}"
          patched_sha="$(git -C source rev-parse HEAD)"
          gh auth setup-git
          fork_url="https://github.com/${GITHUB_REPOSITORY}.git"
          existing_sha="$(git ls-remote "$fork_url" "refs/tags/${RELEASE_TAG}" | awk '{print $1}')"

          if [[ -n "$existing_sha" && "$existing_sha" != "$patched_sha" ]]; then
            echo "Existing tag ${RELEASE_TAG} points to ${existing_sha}, expected ${patched_sha}." >&2
            exit 1
          fi
          if [[ -z "$existing_sha" ]]; then
            git -C source push "$fork_url" "HEAD:refs/tags/${RELEASE_TAG}"
          fi
      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: codex-package-*
          path: dist
          merge-multiple: true
      - name: Download symbols archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: codex-symbols-*
          path: dist
          merge-multiple: true
      - name: Add schema, checksums, and release notes
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.detect.outputs.release_tag }}
          UPSTREAM_TAG: ${{ needs.detect.outputs.upstream_tag }}
          UPSTREAM_URL: ${{ needs.detect.outputs.upstream_url }}
        run: |
          set -euo pipefail
          cp source/codex-rs/core/config.schema.json dist/config-schema.json
          (
            cd dist
            find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\n' |
              sort |
              xargs sha256sum >SHA256SUMS
          )
          cat >release-notes.md <<EOF
          Patched fork build of [${UPSTREAM_TAG}](${UPSTREAM_URL}).

          - Built-in and custom providers can each use their own \`model_providers.<id>.stream_max_retries\` value.
          - Remote compaction uses the same provider retry budget instead of an additional 2-retry cap.
          - The patched hard maximum is 1000 retries per transport.
          - Streaming retry waits are fixed at 7 seconds; exponential and server-requested delays are ignored.
          - Each platform publishes its debug symbols as a separate \`codex-symbols-<target>.tar.gz\` archive.
          - Packages are built on public GitHub-hosted runners and are not signed by OpenAI.
          - Source tag: \`${RELEASE_TAG}\`.
          EOF
      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.detect.outputs.release_tag }}
          name: ${{ needs.detect.outputs.release_tag }}
          body_path: release-notes.md
          files: dist/*
          fail_on_unmatched_files: true
          prerelease: ${{ needs.detect.outputs.prerelease }}
          make_latest: ${{ needs.detect.outputs.prerelease == 'false' }}
